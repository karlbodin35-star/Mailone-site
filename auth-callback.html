<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion en cours — MailOne</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background:
    radial-gradient(620px 620px at -80px -100px, rgba(30,58,138,.38), transparent 70%),
    radial-gradient(560px 560px at calc(100% + 60px) calc(100% + 80px), rgba(76,29,149,.35), transparent 70%),
    #07090F;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  color: #EDF0F5;
}
.card {
  text-align: center;
  padding: 48px 40px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 16px;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 12px 48px rgba(0,0,0,.45);
  max-width: 360px;
  width: 90%;
}
.icon { font-size: 48px; margin-bottom: 16px; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
p  { font-size: 13px; color: #8B93A5; line-height: 1.6; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(255,255,255,.12);
  border-top-color: #5B8CFF;
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <h1 id="title">Connexion en cours…</h1>
  <p id="desc">Fermeture automatique dans un instant.</p>
</div>

<script>
(function () {
  // ── Google auth: JWT delivered via hash fragment ──────────
  const hash = new URLSearchParams(window.location.hash.slice(1));
  const gt   = hash.get('gt');
  if (gt) {
    try {
      localStorage.setItem('mailone_token', gt);
      const uRaw = hash.get('u');
      if (uRaw) {
        const user = JSON.parse(uRaw);
        localStorage.setItem('mailone_user',    JSON.stringify(user));
        localStorage.setItem('mailone_plan',    user.plan    || 'solo');
        if (user.billing) localStorage.setItem('mailone_billing', user.billing);
      }
    } catch (_) {}
    history.replaceState(null, '', window.location.pathname + window.location.search);
    const spinner = document.getElementById('spinner');
    const card    = document.getElementById('card');
    spinner.style.display = 'none';
    card.insertAdjacentHTML('afterbegin', '<div class="icon">✅</div>');
    document.getElementById('title').textContent = 'Connexion réussie !';
    document.getElementById('desc').textContent  = 'Bienvenue sur MailOne…';
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
    return;
  }

  // ── Email OAuth: success/error via query params ────────────
  const params   = new URLSearchParams(window.location.search);
  const success  = params.get('success') === '1';
  const provider = params.get('provider') || '';
  const email    = params.get('email')    || '';
  const error    = params.get('error')    || '';

  const title  = document.getElementById('title');
  const desc   = document.getElementById('desc');
  const spinner = document.getElementById('spinner');

  if (success) {
    spinner.style.display = 'none';
    document.getElementById('card').insertAdjacentHTML('afterbegin', '<div class="icon">✅</div>');
    const provLabel = provider === 'gmail' ? 'Gmail' : provider === 'outlook' ? 'Outlook' : provider;
    title.textContent = provLabel + ' connecté !';
    desc.textContent  = email ? email + ' — fermeture automatique…' : 'Fermeture automatique…';
  } else if (error && error !== 'annulé') {
    spinner.style.display = 'none';
    document.getElementById('card').insertAdjacentHTML('afterbegin', '<div class="icon">❌</div>');
    title.textContent = 'Connexion échouée';
    desc.textContent  = 'Fermez cette fenêtre et réessayez.';
  }

  // Try postMessage (works if COOP allows it)
  try {
    if (window.opener && !window.opener.closed) {
      const msg = success
        ? { type: 'oauth_success', provider, email }
        : { type: 'oauth_error',   error };
      window.opener.postMessage(msg, window.location.origin);
    }
  } catch (_) {}

  // Always close the popup
  setTimeout(() => { try { window.close(); } catch (_) {} }, 1500);
})();
</script>
</body>
</html>
