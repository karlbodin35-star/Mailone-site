<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — MailOne</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07090F;
  --bg-2:#0C1018;
  --glass:rgba(255,255,255,0.04);
  --glass-border:rgba(255,255,255,0.08);
  --glass-hover:rgba(255,255,255,0.07);
  --text:#EDF0F5;
  --text-dim:#8B93A5;
  --accent:#5B8CFF;
  --accent-2:#9F7BFF;
  --accent-glow:rgba(91,140,255,0.35);
  --urgent:#FF5C5C;
  --urgent-glow:rgba(255,92,92,0.25);
  --ok:#3DD68C;
  --radius:16px;
}
html,body{min-height:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* ── Fond : orbes + grille ─────────────────────────────────── */
.orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:.35;pointer-events:none;z-index:0}
.orb-1{width:480px;height:480px;background:#1E3A8A;top:-140px;left:-120px;animation:drift1 18s ease-in-out infinite alternate}
.orb-2{width:420px;height:420px;background:#4C1D95;bottom:-160px;right:-100px;animation:drift2 18s ease-in-out infinite alternate}
@keyframes drift1{from{transform:translate(0,0)}to{transform:translate(70px,50px)}}
@keyframes drift2{from{transform:translate(0,0)}to{transform:translate(-60px,-45px)}}
.gridbg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:48px 48px;
  -webkit-mask-image:radial-gradient(ellipse 75% 65% at 50% 35%,#000 30%,transparent 100%);
          mask-image:radial-gradient(ellipse 75% 65% at 50% 35%,#000 30%,transparent 100%);
}

/* ── Layout ────────────────────────────────────────────────── */
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 22px 80px}
header{display:flex;align-items:center;justify-content:space-between;padding:22px 0 8px}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:21px;letter-spacing:-.02em;color:#fff;text-decoration:none}
.logo em{font-style:normal;background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hdr-actions{display:flex;align-items:center;gap:14px}
.hdr-link{font-size:12.5px;color:var(--text-dim);text-decoration:none;transition:color .2s}
.hdr-link:hover{color:var(--text)}

.label{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim)}

h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(26px,4vw,36px);letter-spacing:-.02em;margin:34px 0 8px}
.sub{font-size:15px;color:var(--text-dim);line-height:1.6;max-width:560px}
.sub b{color:var(--text);font-weight:600}
.sub .n-urgent{color:var(--urgent);font-weight:700}

/* ── Cartes glass ──────────────────────────────────────────── */
.card{
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}

/* ── Liste des mails (une seule, épurée) ───────────────────── */
.section{margin-top:30px}
.mrow{
  display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;
  padding:15px 18px;margin-bottom:9px;color:var(--text);
  font-family:inherit;font-size:inherit;
  transition:background .2s,box-shadow .25s,transform .2s;
}
.mrow:hover{background:var(--glass-hover);transform:translateY(-1px)}
.mrow:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.mrow.urgent{border-left:3px solid var(--urgent)}
.mrow.urgent:hover{box-shadow:0 0 26px var(--urgent-glow)}
.mrow.done{opacity:.45}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.14)}
.dot.urgent{background:var(--urgent);animation:pulse 1.6s ease-in-out infinite}
.dot.done{background:var(--ok);animation:none}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--urgent-glow)}50%{box-shadow:0 0 0 8px rgba(255,92,92,0)}}
.m-from{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;flex-shrink:0;max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m-subj{font-size:13.5px;color:var(--text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m-time{font-family:'Space Grotesk',sans-serif;font-size:11.5px;color:var(--text-dim);white-space:nowrap;flex-shrink:0}

/* ── Boutons ───────────────────────────────────────────────── */
.btn{
  font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13.5px;
  border:none;border-radius:11px;padding:12px 22px;cursor:pointer;
  transition:transform .2s,box-shadow .2s,background .2s;color:var(--text);
}
.btn:disabled{opacity:.55;cursor:default;transform:none!important}
.btn-primary{
  background:linear-gradient(90deg,var(--accent),#7B6CFF);color:#fff;
  box-shadow:0 6px 24px var(--accent-glow);
}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 30px var(--accent-glow)}
.btn-ghost{background:var(--glass);border:1px solid var(--glass-border)}
.btn-ghost:hover:not(:disabled){background:var(--glass-hover)}
.btn-danger-ghost{background:transparent;border:1px solid rgba(255,92,92,.3);color:var(--urgent)}
.btn-danger-ghost:hover:not(:disabled){background:rgba(255,92,92,.08)}

/* ── Vue triage split-screen ───────────────────────────────── */
.back{
  display:inline-flex;align-items:center;gap:7px;margin:26px 0 20px;
  font-family:'Space Grotesk',sans-serif;font-size:12.5px;font-weight:600;color:var(--text-dim);
  background:none;border:none;cursor:pointer;transition:color .2s;
}
.back:hover{color:var(--text)}
.split{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
.pane{padding:24px}
.pane .label{display:block;margin-bottom:16px}
.orig-subj{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;margin-bottom:12px}
.orig-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.meta-chip{font-size:12px;color:var(--text-dim);background:var(--glass);border:1px solid var(--glass-border);border-radius:8px;padding:5px 10px}
.orig-body{font-size:14px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-word}

.ai-pane{
  background:linear-gradient(135deg,rgba(91,140,255,.10),rgba(159,123,255,.07));
  border:1px solid rgba(91,140,255,.25);
  border-radius:var(--radius);
  box-shadow:0 0 42px rgba(91,140,255,.14);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
.ai-head{display:flex;align-items:center;gap:9px;margin-bottom:16px}
.ai-dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(90deg,var(--accent),var(--accent-2));box-shadow:0 0 10px var(--accent-glow)}
.draft{
  font-size:14px;line-height:1.75;white-space:pre-wrap;word-break:break-word;min-height:140px;
}
.caret{display:inline-block;width:8px;height:16px;background:var(--accent);vertical-align:-2px;animation:blink .85s step-end infinite;border-radius:2px}
@keyframes blink{50%{opacity:0}}
.draft-edit{
  width:100%;min-height:240px;resize:vertical;display:none;
  background:rgba(7,9,15,.55);border:1px solid rgba(91,140,255,.3);border-radius:12px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px;
}
.draft-edit:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,140,255,.15)}
.ai-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
.gen-label{font-size:12px;color:var(--text-dim);margin-top:12px}

/* ── États : skeleton / vide / erreur ──────────────────────── */
.skeleton{position:relative;overflow:hidden;padding:18px 20px;margin-bottom:12px;min-height:76px}
.sk-line{height:11px;border-radius:6px;background:rgba(255,255,255,.06);margin-bottom:10px}
.skeleton::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(100deg,transparent 30%,rgba(255,255,255,.05) 50%,transparent 70%);
  animation:shimmer 1.6s linear infinite;
}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.state{padding:52px 30px;text-align:center}
.state .ico{font-size:40px;margin-bottom:14px}
.state h2{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;margin-bottom:8px}
.state p{font-size:13.5px;color:var(--text-dim);line-height:1.65;max-width:380px;margin:0 auto 20px}
.state.ok .ico{filter:drop-shadow(0 0 18px rgba(61,214,140,.5))}

/* ── Toast ─────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translate(-50%,80px);opacity:0;z-index:60;
  display:flex;align-items:center;gap:9px;
  background:var(--bg-2);border:1px solid var(--glass-border);border-radius:12px;
  padding:13px 20px;font-size:13px;font-weight:500;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
  transition:transform .35s cubic-bezier(.2,.8,.2,1),opacity .35s;
  max-width:calc(100vw - 40px);
}
.toast.on{transform:translate(-50%,0);opacity:1}
.toast .t-ok{color:var(--ok)}

/* ── Animations d'entrée ───────────────────────────────────── */
.rise{animation:rise .55s cubic-bezier(.2,.8,.2,1) both}
@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* ── Responsive ────────────────────────────────────────────── */
@media (max-width:760px){
  .split{grid-template-columns:1fr}
  .m-from{max-width:120px}
  .ai-actions .btn{flex:1;padding:12px 10px}
}

/* ── Reduced motion ────────────────────────────────────────── */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="gridbg"></div>

<div class="wrap">
  <header>
    <a class="logo" href="dashboard.html">Mail<em>One</em></a>
    <nav class="hdr-actions">
      <a class="hdr-link" href="app.html">Boîte complète</a>
      <a class="hdr-link" href="account.html">Compte</a>
      <a class="hdr-link" href="#" onclick="Auth.logout();return false">Déconnexion</a>
    </nav>
  </header>

  <!-- ══ VUE DASHBOARD ══════════════════════════════════════ -->
  <main id="view-dashboard">
    <h1 id="greeting">Bonjour</h1>
    <p class="sub" id="summary">Chargement de votre boîte…</p>

    <section class="section">
      <div id="mail-list"></div>
    </section>
  </main>

  <!-- ══ VUE TRIAGE ═════════════════════════════════════════ -->
  <main id="view-triage" style="display:none">
    <button class="back" onclick="closeTriage()">← Retour au dashboard</button>
    <div class="split">
      <article class="card pane" id="pane-mail">
        <span class="label">Mail reçu</span>
        <div class="orig-subj" id="t-subject"></div>
        <div class="orig-meta">
          <span class="meta-chip" id="t-from"></span>
          <span class="meta-chip" id="t-email"></span>
          <span class="meta-chip" id="t-date"></span>
        </div>
        <div class="orig-body" id="t-body"></div>
      </article>

      <aside class="ai-pane pane">
        <div class="ai-head">
          <span class="ai-dot"></span>
          <span class="label" style="margin:0">Réponse rédigée par MailOne</span>
        </div>
        <div class="draft" id="t-draft"></div>
        <textarea class="draft-edit" id="t-edit" aria-label="Modifier la réponse"></textarea>
        <div class="gen-label" id="t-gen" style="display:none">MailOne rédige votre réponse…</div>
        <div class="ai-actions" id="t-actions" style="visibility:hidden">
          <button class="btn btn-primary" id="btn-send" onclick="sendReply()">Envoyer la réponse</button>
          <button class="btn btn-ghost" id="btn-edit" onclick="toggleEdit(true)">Modifier</button>
          <button class="btn btn-ghost" id="btn-cancel" onclick="toggleEdit(false)" style="display:none">Annuler</button>
          <button class="btn btn-danger-ghost" id="btn-dismiss" onclick="dismissMail()">Ignorer</button>
        </div>
      </aside>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="mailone.js"></script>
<script>
'use strict';
if (!Auth.requireAuth()) throw new Error('redirect login');

const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const CAT_LABEL = { urgent:'Urgent', quote:'Devis', appt:'RDV', invoice:'Facture' };

const state = { data:null, current:null, typer:null, editing:false };

// ── Utils ────────────────────────────────────────────────────
function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtTime(iso){
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const diff = (Date.now() - d.getTime()) / 60000;
  if (diff < 60)   return `il y a ${Math.max(1, Math.round(diff))} min`;
  if (diff < 1440) return `il y a ${Math.round(diff/60)} h`;
  return d.toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
}
function toast(ico, msg, ok = false){
  const t = document.getElementById('toast');
  t.innerHTML = `<span class="${ok?'t-ok':''}">${ico}</span><span>${esc(msg)}</span>`;
  t.classList.add('on');
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove('on'), 3600);
}

// ── Chargement ───────────────────────────────────────────────
function showSkeletons(){
  document.getElementById('mail-list').innerHTML =
    '<div class="card skeleton" style="min-height:50px;padding:15px 18px"><div class="sk-line" style="width:80%;margin:0"></div></div>'.repeat(5);
}

async function loadDashboard(){
  const u = Auth.getUser();
  document.getElementById('greeting').textContent = `Bonjour ${u?.first_name || u?.firstName || ''}`.trim();
  document.getElementById('summary').textContent  = 'Chargement de votre boîte…';
  showSkeletons();

  try {
    const data = await API.get('/api/dashboard');
    if (!data) return; // token expiré → logout géré par mailone.js
    state.data = data;
    renderDashboard();
  } catch (err) {
    if (err.code === 'NO_ACCOUNT') {
      renderFullState('📮', 'Connectez votre boîte mail',
        'MailOne a besoin d\'accéder à votre boîte pour trier vos emails. La connexion prend une minute.',
        '<button class="btn btn-primary" onclick="reconnectGmail()">Connecter Gmail (2 clics) →</button> <a class="btn btn-ghost" href="app.html" style="text-decoration:none;display:inline-block">Autre boîte (IMAP)</a>');
    } else if (err.code === 'SCOPE_MISSING') {
      renderFullState('🔐', 'Autorisation Gmail manquante',
        'Votre compte Google est bien connecté, mais la case « Consulter vos messages Gmail » n\'a pas été cochée. Recommencez en <b>cochant la case</b> sur l\'écran Google.',
        '<button class="btn btn-primary" onclick="reconnectGmail()">Autoriser l\'accès Gmail →</button>');
    } else if (err.code === 'OAUTH_EXPIRED' || err.status === 401) {
      renderFullState('🔄', 'Session boîte mail expirée',
        'Reconnectez votre boîte pour reprendre le triage.',
        '<a class="btn btn-primary" href="app.html" style="text-decoration:none;display:inline-block">Reconnecter →</a>');
    } else {
      renderFullState('⚠️', 'Impossible de charger vos mails',
        esc(err.message || 'Erreur inconnue.'),
        '<button class="btn btn-primary" onclick="loadDashboard()">Réessayer</button>');
    }
  }
}

function renderFullState(ico, title, text, actionsHtml){
  document.getElementById('summary').textContent = '';
  document.getElementById('mail-list').innerHTML =
    `<div class="card state rise"><div class="ico">${ico}</div><h2>${esc(title)}</h2><p>${text}</p>${actionsHtml}</div>`;
}

// ── Rendu dashboard ──────────────────────────────────────────
function renderDashboard(){
  const d = state.data;
  const u = Auth.getUser();
  document.getElementById('greeting').textContent = `Bonjour ${d.user?.firstName || u?.first_name || ''}`.trim();

  const n = d.urgentCount;
  document.getElementById('summary').innerHTML = n > 0
    ? `<span class="n-urgent">${n} mail${n>1?'s':''} urgent${n>1?'s':''}</span> à traiter — cliquez, la réponse est prête.`
    : `Tout est sous contrôle — <b>aucun mail urgent.</b> Cliquez sur un mail pour voir la réponse proposée.`;

  const list = document.getElementById('mail-list');
  const mails = d.mails || [];
  if (!mails.length) {
    list.innerHTML = `<div class="card state ok rise">
      <div class="ico">📭</div><h2>Boîte vide</h2>
      <p>Aucun email pour l'instant. MailOne surveille votre boîte en continu.</p>
    </div>`;
    return;
  }

  list.innerHTML = mails.map((m, i) => `
    <button class="mrow card rise ${m.urgent ? 'urgent' : ''} ${m.status ? 'done' : ''}"
            style="animation-delay:${REDUCED?0:Math.min(i,12)*40}ms" onclick="openTriage('${esc(String(m.id))}')">
      <span class="dot ${m.urgent ? 'urgent' : ''} ${m.status ? 'done' : ''}"></span>
      <span class="m-from">${esc(m.from)}</span>
      <span class="m-subj">${esc(m.subject)}</span>
      <span class="m-time">${m.status === 'handled' ? '✓ répondu' : m.status === 'dismissed' ? 'ignoré' : fmtTime(m.receivedAt)}</span>
    </button>`).join('');
}

// ── Vue triage ───────────────────────────────────────────────
function openTriage(id){
  const m = (state.data.mails || []).find(x => String(x.id) === String(id));
  if (!m) return;
  state.current = m;
  state.editing = false;

  document.getElementById('view-dashboard').style.display = 'none';
  document.getElementById('view-triage').style.display = '';
  window.scrollTo({ top: 0 });

  document.getElementById('t-subject').textContent = m.subject;
  document.getElementById('t-from').textContent    = `De : ${m.from}`;
  document.getElementById('t-email').textContent   = m.fromEmail || '';
  document.getElementById('t-date').textContent    = fmtTime(m.receivedAt);
  document.getElementById('t-body').textContent    = m.body || '(aperçu indisponible)';

  toggleEditUI(false);
  document.getElementById('t-actions').style.visibility = 'hidden';
  typeDraft(m.aiDraft || '');
}

function typeDraft(text){
  const el  = document.getElementById('t-draft');
  const gen = document.getElementById('t-gen');
  if (state.typer) { clearInterval(state.typer); state.typer = null; }

  if (REDUCED || !text) {
    el.textContent = text;
    document.getElementById('t-actions').style.visibility = 'visible';
    return;
  }

  gen.style.display = '';
  el.innerHTML = '<span class="caret"></span>';
  let i = 0;
  state.typer = setInterval(() => {
    i = Math.min(text.length, i + 3);
    el.textContent = text.slice(0, i);
    if (i < text.length) {
      const caret = document.createElement('span');
      caret.className = 'caret';
      el.appendChild(caret);
    } else {
      clearInterval(state.typer); state.typer = null;
      gen.style.display = 'none';
      document.getElementById('t-actions').style.visibility = 'visible';
    }
  }, 12);
}

function closeTriage(){
  if (state.typer) { clearInterval(state.typer); state.typer = null; }
  document.getElementById('view-triage').style.display = 'none';
  document.getElementById('view-dashboard').style.display = '';
  state.current = null;
}

// ── Modifier ─────────────────────────────────────────────────
function toggleEdit(on){
  if (state.typer) { clearInterval(state.typer); state.typer = null; document.getElementById('t-gen').style.display = 'none'; }
  state.editing = on;
  if (on) document.getElementById('t-edit').value = getDraftText();
  toggleEditUI(on);
  document.getElementById('t-actions').style.visibility = 'visible';
  if (on) document.getElementById('t-edit').focus();
}
function toggleEditUI(on){
  document.getElementById('t-draft').style.display  = on ? 'none' : '';
  document.getElementById('t-edit').style.display   = on ? 'block' : 'none';
  document.getElementById('btn-edit').style.display = on ? 'none' : '';
  document.getElementById('btn-cancel').style.display = on ? '' : 'none';
  document.getElementById('btn-send').textContent   = on ? 'Enregistrer et envoyer' : 'Envoyer la réponse';
}
function getDraftText(){
  return state.editing
    ? document.getElementById('t-edit').value
    : (state.current?.aiDraft || document.getElementById('t-draft').textContent);
}

// ── Actions ──────────────────────────────────────────────────
function setCurrentStatus(status){
  const m = state.current;
  m.status = status;
  m.urgent = false;
  state.data.urgentCount = (state.data.mails || []).filter(x => x.urgent).length;
}

async function sendReply(){
  const m = state.current;
  const content = getDraftText().trim();
  if (!content) { toast('⚠️', 'La réponse est vide.'); return; }

  const btn = document.getElementById('btn-send');
  btn.disabled = true; btn.textContent = 'Envoi en cours…';

  try {
    await API.post(`/api/mails/${encodeURIComponent(m.id)}/reply`, { content });
    setCurrentStatus('handled');
    closeTriage();
    renderDashboard();
    toast('✅', 'Réponse envoyée — mail classé comme traité', true);
  } catch (err) {
    if (err.code === 'SEND_UNSUPPORTED') {
      // TODO: envoi via l'API Gmail (scope gmail.send) non disponible —
      // fallback : brouillon pré-rempli dans le logiciel mail de l'utilisateur.
      const subject = /^re\s*:/i.test(m.subject) ? m.subject : `Re: ${m.subject}`;
      window.location.href = `mailto:${encodeURIComponent(m.fromEmail)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(content)}`;
      toast('📤', 'Réponse pré-remplie dans votre logiciel mail — cliquez Envoyer.');
    } else {
      toast('⚠️', err.message || 'Envoi impossible.');
    }
  } finally {
    btn.disabled = false;
    btn.textContent = state.editing ? 'Enregistrer et envoyer' : 'Envoyer la réponse';
  }
}

async function dismissMail(){
  const m = state.current;
  const btn = document.getElementById('btn-dismiss');
  btn.disabled = true;
  try {
    await API.post(`/api/mails/${encodeURIComponent(m.id)}/dismiss`, {});
    setCurrentStatus('dismissed');
    closeTriage();
    renderDashboard();
    toast('🗂️', 'Mail ignoré — il ne réapparaîtra plus en urgent.');
  } catch (err) {
    toast('⚠️', err.message || 'Action impossible.');
  } finally {
    btn.disabled = false;
  }
}

// ── Reconnexion Gmail (popup OAuth) ──────────────────────────
function reconnectGmail(){
  const token = Auth.getToken();
  if (!token) return;
  window.open(`${CONFIG.API_URL}/api/oauth/gmail/start?state=${encodeURIComponent(token)}`,
    'mailone_oauth', 'width=540,height=680,left=200,top=80,menubar=no,toolbar=no,scrollbars=yes');
  toast('🔗', 'Autorisez l\'accès dans la fenêtre Google — cochez bien la case Gmail.');
}
window.addEventListener('message', (e) => {
  if (e.origin !== window.location.origin) return;
  if (e.data?.type === 'oauth_success') { toast('✅', 'Gmail autorisé — chargement…', true); loadDashboard(); }
  else if (e.data?.type === 'oauth_error') toast('❌', 'Connexion Google échouée. Réessayez.');
});

loadDashboard();
</script>
