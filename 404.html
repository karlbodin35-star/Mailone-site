<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — MailOne</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="robots" content="noindex">
<style>
:root {
  --bg:    #F8F7F5;
  --bg2:   #0C1018;
  --sur:   #FFFFFF;
  --bdr:   rgba(255,255,255,.08);
  --ink:   #EDF0F5;
  --ink2:  #C6CCD8;
  --ink3:  #8B93A5;
  --ink4:  #7C8496;
  --grn:   #5B8CFF;
  --grn-d: #4E79E8;
  --grn-l: rgba(91,140,255,.12);
  --drk:   #0C1018;
  --ease: cubic-bezier(0.25, 0, 0, 1);
  --dur: 250ms;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); }
body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
:focus-visible { outline: 2px solid var(--grn); outline-offset: 2px; border-radius: 4px; }

.badge {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink4);
  background: var(--bg2);
  border: 1px solid var(--bdr);
  border-radius: 100px;
  padding: 5px 14px;
  margin-bottom: 28px;
}

.number {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(80px, 18vw, 140px);
  font-weight: 700;
  letter-spacing: -.06em;
  line-height: 1;
  color: var(--bg2);
  -webkit-text-stroke: 2px var(--bdr2, rgba(255,255,255,.16));
  margin-bottom: 16px;
  user-select: none;
}

h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(22px, 5vw, 32px);
  font-weight: 700;
  letter-spacing: -.04em;
  margin-bottom: 10px;
}
p { font-size: 15px; color: var(--ink3); line-height: 1.65; max-width: 440px; margin-bottom: 36px; }

.actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

.btn-primary {
  padding: 12px 24px;
  background: var(--grn);
  color: #fff;
  border: none; border-radius: 10px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px; font-weight: 700;
  text-decoration: none; cursor: pointer;
  transition: background var(--dur) var(--ease), transform var(--dur) var(--ease);
  display: inline-flex; align-items: center; gap: 6px;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:hover { background: var(--grn-d); }
.btn-primary:active { transform: scale(.98); }

.btn-ghost {
  padding: 12px 24px;
  background: var(--sur);
  color: var(--ink2);
  border: 1.5px solid var(--bdr);
  border-radius: 10px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px; font-weight: 600;
  text-decoration: none; cursor: pointer;
  transition: border-color var(--dur) var(--ease), background var(--dur) var(--ease);
  display: inline-flex; align-items: center; gap: 6px;
  -webkit-tap-highlight-color: transparent;
}
.btn-ghost:hover { border-color: var(--bdr2); background: var(--bg2); }

.nav-logo {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px; font-weight: 700;
  color: var(--ink); text-decoration: none; letter-spacing: -.5px;
  background: var(--sur); border: 1px solid var(--bdr);
  border-radius: 10px; padding: 8px 14px;
}
.logo-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--grn); margin-left: 3px; vertical-align: middle; }
</style>
<link rel="stylesheet" href="da.css">
</head>
<body>

<a href="index.html" class="nav-logo">Mail<span style="opacity:.4">One</span><span class="logo-dot" aria-hidden="true"></span></a>

<div class="badge">Erreur 404</div>

<div class="number" aria-hidden="true">404</div>

<h1>Cette page n'existe pas.</h1>
<p>La page que vous cherchez a peut-être été déplacée, supprimée, ou l'adresse est incorrecte.</p>

<div class="actions">
  <a href="index.html" class="btn-primary">
    <span>🏠</span> Retour à l'accueil
  </a>
  <a href="contact.html" class="btn-ghost">
    <span>💬</span> Contacter le support
  </a>
</div>

</body>
</html>
